{% extends 'base.html' %}

{% block content %}
<section class="section-content padding-y">
    <div class="container">
        <h4 class="mb-4">Eliminar usuario</h4>
        <div class="card">
            <div class="card-body">
                <p>¿Seguro que quieres eliminar a <strong>{{ user_obj.first_name }} {{ user_obj.last_name }}</strong>?</p>
                <form method="post" action="{% url 'accounts:admin_user_delete' user_obj.id %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a class="btn btn-light ml-2" href="{% url 'accounts:admin_user_detail' user_obj.id %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
